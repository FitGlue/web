{{> header}}

<main>
<style>
  .error-wrap {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 32px;
  }

  .error-404 {
    font-family: var(--fg-font-display);
    font-size: clamp(8rem, 20vw, 22rem);
    line-height: .85;
    letter-spacing: -.06em;
    text-transform: uppercase;
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0;
  }

  .error-heading {
    font-family: var(--fg-font-display);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    letter-spacing: -.025em;
    text-transform: uppercase;
    margin: 16px 0 20px;
    line-height: 1;
  }

  .error-body {
    font-family: var(--fg-font-body);
    font-size: 1.0625rem;
    color: var(--color-text-muted);
    line-height: 1.6;
    max-width: 480px;
    margin-bottom: 40px;
  }

  .error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-aurora {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 14px 28px;
    background: var(--gradient-primary);
    color: var(--fg-ink);
    font-family: var(--fg-font-display);
    font-size: .875rem;
    letter-spacing: .04em;
    text-transform: uppercase;
    border: 0;
    cursor: pointer;
  }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 14px 28px;
    background: transparent;
    color: var(--fg-paper);
    box-shadow: inset 0 0 0 1.5px var(--fg-paper);
    font-family: var(--fg-font-display);
    font-size: .875rem;
    letter-spacing: .04em;
    text-transform: uppercase;
    border: 0;
    cursor: pointer;
  }

  .error-mono {
    font-family: var(--fg-font-mono);
    font-size: .75rem;
    letter-spacing: .12em;
    color: var(--color-text-subtle);
    text-transform: uppercase;
    margin-top: 48px;
  }

  @media (max-width: 600px) {
    .error-wrap { padding: 60px 16px; }
    .error-actions { flex-direction: column; align-items: center; }
    .btn-aurora, .btn-ghost { width: 100%; max-width: 280px; justify-content: center; }
  }
</style>

  <div class="error-wrap">
    <div class="error-404">404</div>
    <h1 class="error-heading">Lost the thread.</h1>
    <p class="error-body">This page doesn't exist — or it moved when we weren't looking. Either way, let's get you back to something useful.</p>
    <div class="error-actions">
      <a href="/" class="btn-aurora">→ HOME</a>
      <a href="javascript:history.back()" class="btn-ghost">← BACK</a>
    </div>
    <p class="error-mono">HTTP 404 · PAGE NOT FOUND</p>
  </div>
</main>

{{> footer}}
