{{> auth-head}}

<div class="auth-split">
  <!-- LEFT: brand panel -->
  <div class="auth-side auth-side--brand">
    <a href="/" class="auth-logo">FITGLUE</a>
    <div>
      <div class="auth-eyebrow" style="color: var(--color-text-muted); margin-bottom: 1.5rem">SIGNING OUT</div>
      <div class="auth-brand-quote">
        SEE YOU<br><span class="text-gradient">NEXT TIME.</span>
      </div>
    </div>
    <div class="auth-brand-footer">
      <span>© 2026 FitGlue</span><span>—</span>
      <a href="/privacy">PRIVACY</a>
      <a href="/terms">TERMS</a>
    </div>
  </div>

  <!-- RIGHT: state card -->
  <div class="auth-side auth-side--form">
    <div class="auth-form">
      <div class="auth-eyebrow">Logging Out</div>
      <h1>SIGNING<br><span class="text-gradient">YOU OUT...</span></h1>
      <p class="lead" id="logout-message">Signing you out...</p>
      <p class="auth-footer-note" style="margin-top:1rem">You'll be redirected to the homepage shortly.</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getAuth, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

  const messageEl = document.getElementById('logout-message');

  async function getFirebaseConfig() {
    try {
      const response = await fetch('/__/firebase/init.json');
      if (response.ok) {
        return await response.json();
      }
    } catch (e) {
      console.warn('Could not load Firebase config:', e);
    }
    return null;
  }

  async function logout() {
    const firebaseConfig = await getFirebaseConfig();
    if (!firebaseConfig) {
      messageEl.textContent = 'Redirecting...';
      setTimeout(() => {
        window.location.href = '/';
      }, 1000);
      return;
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    try {
      await signOut(auth);
      messageEl.textContent = 'You have been logged out successfully.';
      setTimeout(() => {
        window.location.href = '/';
      }, 1500);
    } catch (error) {
      messageEl.textContent = 'Error logging out. Redirecting...';
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }
  }

  logout();
</script>

{{> auth-footer}}
