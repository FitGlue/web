{{> auth-head}}

<div class="auth-split">
  <!-- LEFT: brand panel -->
  <div class="auth-side auth-side--brand">
    <a href="/" class="auth-logo">FITGLUE</a>
    <div>
      <div class="auth-eyebrow" style="color: var(--fg-pink); margin-bottom: 1.5rem">✦ SECURE RESET</div>
      <div class="auth-brand-quote">
        BACK IN<br>THE<br><span class="text-gradient">GAME.</span>
      </div>
      <div class="auth-trust">
        <span class="fg-stamp fg-stamp--outline">SECURE LINK</span>
        <span class="fg-stamp fg-stamp--outline">EXPIRES IN 1HR</span>
      </div>
    </div>
    <div class="auth-brand-footer">
      <span>© 2026 FitGlue</span><span>—</span>
      <a href="/privacy">PRIVACY</a>
      <a href="/terms">TERMS</a>
    </div>
  </div>

  <!-- RIGHT: form -->
  <div class="auth-side auth-side--form">
    <form class="auth-form" onsubmit="event.preventDefault()">
      <div class="auth-eyebrow">Reset Password</div>
      <h1>FORGOT YOUR<br><span class="text-gradient">PASSWORD?</span></h1>
      <p class="lead">Enter your email address and we'll send you a link to reset your password.</p>

      <div id="auth-error" class="auth-message error" style="display: none;"></div>
      <div id="auth-success" class="auth-message success" style="display: none;"></div>

      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <button id="btn-reset" class="auth-submit" type="button">Send Reset Link →</button>

      <p class="auth-footer-note">Remember your password? <a href="/auth/login">Login →</a></p>
    </form>
  </div>
</div>

<script type="module">
  const errorEl = document.getElementById('auth-error');
  const successEl = document.getElementById('auth-success');

  function showError(message) {
    successEl.style.display = 'none';
    errorEl.textContent = message;
    errorEl.style.display = 'block';
  }

  function showSuccess(message) {
    errorEl.style.display = 'none';
    successEl.textContent = message;
    successEl.style.display = 'block';
  }

  document.getElementById('btn-reset').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();

    if (!email) {
      showError('Please enter your email address.');
      return;
    }

    try {
      const response = await fetch('/api/v2/auth-email/send-password-reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.error || 'Failed to send reset email');
      }

      showSuccess('If an account exists with this email, a password reset link has been sent. Check your inbox.');
    } catch (error) {
      showError(error.message);
    }
  });

  document.getElementById('email').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      document.getElementById('btn-reset').click();
    }
  });
</script>

{{> auth-footer}}
