<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reset your FitGlue password" />
  <title>Reset Password | FitGlue</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --fg-ink: #07070F;
      --fg-ink-2: #0E0E1C;
      --fg-ink-3: #181828;
      --fg-paper: #F0EEE6;
      --fg-pink: #FF3DA6;
      --fg-violet: #8B5CF6;
      --fg-cyan: #22D3EE;
      --fg-green: #22C55E;
      --fg-rose: #F43F5E;
      --fg-gold: #FFD60A;
      --gradient-primary: linear-gradient(135deg, #FF3DA6 0%, #8B5CF6 50%, #22D3EE 100%);
      --fg-rule-thin: 1px solid #181828;
      --fg-rule-thick: 2px solid #F0EEE6;
      --fg-font-display: 'Archivo Black', sans-serif;
      --fg-font-body: 'Archivo', sans-serif;
      --fg-font-mono: 'JetBrains Mono', monospace;
      --color-text-muted: rgba(240,238,230,0.55);
      --color-text-subtle: rgba(240,238,230,0.30);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--fg-ink);
      color: var(--fg-paper);
      margin: 0;
      font-family: var(--fg-font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    a { color: inherit; text-decoration: none; }

    .auth--single {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 80vh;
    }

    .auth__form {
      padding: 80px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .auth__form-inner {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth__logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--fg-font-display);
      font-size: 1.5rem;
      color: var(--fg-paper);
    }

    .auth__logo-mark {
      width: 36px;
      height: 36px;
      background: var(--gradient-primary);
      color: var(--fg-ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fg-font-display);
      font-size: 1rem;
    }

    .auth__crumb {
      font-family: var(--fg-font-mono);
      font-size: .6875rem;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--color-text-muted);
      text-transform: uppercase;
      text-align: center;
    }

    .auth__title {
      font-family: var(--fg-font-display);
      font-size: 2.5rem;
      line-height: 1;
      letter-spacing: -.025em;
      text-transform: uppercase;
      margin: 6px 0 0;
      text-align: center;
    }

    .auth__title .gr {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth__field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .auth__label {
      font-family: var(--fg-font-mono);
      font-size: .625rem;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }

    .auth__input {
      background: var(--fg-ink-2);
      padding: 14px 16px;
      font-family: var(--fg-font-mono);
      font-size: .9375rem;
      color: var(--fg-paper);
      border: 0;
      box-shadow: inset 0 0 0 1.5px var(--fg-ink-3);
      outline: none;
      width: 100%;
    }

    .auth__input:focus {
      box-shadow: inset 0 0 0 2px var(--fg-paper);
    }

    .auth__cta {
      padding: 16px 18px;
      background: var(--gradient-primary);
      color: var(--fg-ink);
      font-family: var(--fg-font-display);
      font-size: 1rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      border: 0;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .auth__foot {
      font-family: var(--fg-font-mono);
      font-size: .8125rem;
      color: var(--color-text-muted);
      letter-spacing: .04em;
      text-align: center;
      margin-top: 8px;
    }

    .auth__foot a {
      color: var(--fg-cyan);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="auth--single">
    <div class="auth__form">
      <div class="auth__form-inner">
        <div style="display:flex;justify-content:center;margin-bottom:18px">
          <div class="auth__logo">
            <span class="auth__logo-mark">FG</span>
            <span>FITGLUE</span>
          </div>
        </div>

        <div class="auth__crumb">RESET PASSWORD</div>
        <h2 class="auth__title">New <span class="gr">password.</span></h2>

        <div class="auth__field">
          <label class="auth__label" for="new-password">NEW PASSWORD · MIN 10 CHARS</label>
          <input id="new-password" class="auth__input" type="password" placeholder="••••••••••" autocomplete="new-password" />
        </div>

        <div class="auth__field">
          <label class="auth__label" for="confirm-password">CONFIRM PASSWORD</label>
          <input id="confirm-password" class="auth__input" type="password" placeholder="••••••••••" autocomplete="new-password" />
        </div>

        <button class="auth__cta" id="set-password-btn">SET NEW PASSWORD <span>→</span></button>

        <p class="auth__foot"><a href="/auth/login">← BACK TO SIGN IN</a></p>
      </div>
    </div>
  </div>
</body>
</html>
