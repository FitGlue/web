<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Waitlist Confirmed - FitGlue" />
  <title>You're In | FitGlue</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --fg-ink: #07070F;
      --fg-ink-2: #0E0E1C;
      --fg-ink-3: #181828;
      --fg-paper: #F0EEE6;
      --fg-pink: #FF3DA6;
      --fg-violet: #8B5CF6;
      --fg-cyan: #22D3EE;
      --fg-green: #22C55E;
      --fg-rose: #F43F5E;
      --fg-gold: #FFD60A;
      --gradient-primary: linear-gradient(135deg, #FF3DA6 0%, #8B5CF6 50%, #22D3EE 100%);
      --fg-rule-thin: 1px solid #181828;
      --fg-rule-thick: 2px solid #F0EEE6;
      --fg-font-display: 'Archivo Black', sans-serif;
      --fg-font-body: 'Archivo', sans-serif;
      --fg-font-mono: 'JetBrains Mono', monospace;
      --color-text-muted: rgba(240,238,230,0.55);
      --color-text-subtle: rgba(240,238,230,0.30);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: var(--fg-ink);
      color: var(--fg-paper);
      margin: 0;
      font-family: var(--fg-font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    a { color: inherit; text-decoration: none; }

    .state {
      padding: 80px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      max-width: 540px;
      margin: 0 auto;
    }

    .state__stamp {
      padding: 6px 12px;
      background: var(--gradient-primary);
      color: var(--fg-ink);
      font-family: var(--fg-font-mono);
      font-size: .6875rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .state__stamp--green {
      background: var(--fg-green);
      color: var(--fg-ink);
    }

    .state__h {
      font-family: var(--fg-font-display);
      font-size: 3rem;
      line-height: .95;
      letter-spacing: -.035em;
      text-transform: uppercase;
      margin: 8px 0;
    }

    .state__h .gr {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .state__body {
      font-family: var(--fg-font-body);
      font-size: 1.0625rem;
      line-height: 1.55;
      color: var(--color-text-muted);
    }

    .state__body b { color: var(--fg-paper); }

    .state__cta {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 12px 18px;
      font-family: var(--fg-font-display);
      font-size: .875rem;
      letter-spacing: .04em;
      cursor: pointer;
      border: 0;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn--aurora {
      background: var(--gradient-primary);
      color: var(--fg-ink);
    }

    .btn--ghost {
      background: transparent;
      color: var(--fg-paper);
      box-shadow: inset 0 0 0 1.5px var(--fg-paper);
    }
  </style>
</head>
<body>
  <div class="state">
    <span class="state__stamp state__stamp--green">✓ WAITLIST CONFIRMED</span>
    <h2 class="state__h">You're <span class="gr">in.</span></h2>
    <p class="state__body">Welcome to FitGlue. Your account is active. Let's connect your first source — pick anywhere your activities live today and we'll do the rest.</p>
    <div class="state__cta">
      <a href="/app/connections" class="btn btn--aurora">CONNECT FIRST SOURCE →</a>
    </div>
  </div>
</body>
</html>
