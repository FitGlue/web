<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="{{description}}">
        <meta name="keywords"
            content="workout transformation, Strava enhancement, Hevy to Strava, Fitbit heart rate, muscle heatmap, workout enrichment, fitness automation, AI workout descriptions, gym to Strava, parkrun results">
        <meta name="author" content="FitGlue">
        <meta name="robots" content="index, follow">
        <meta name="theme-color" content="#ff3da6">

        <!-- Open Graph -->
        <meta property="og:title"
            content="{{#if isHome}}FitGlue – Watch Your Workout Become Extraordinary{{else}}{{pageTitle}} | FitGlue{{/if}}">
        <meta property="og:description" content="{{description}}">
        <meta property="og:type" content="website">
        <meta property="og:url" content="{{siteUrl}}{{canonicalPath}}">
        <meta property="og:image" content="{{siteUrl}}images/og-image.png">
        <meta property="og:site_name" content="FitGlue">
        <meta property="og:locale" content="en_GB">

        <!-- Canonical -->
        <link rel="canonical" href="{{siteUrl}}{{canonicalPath}}">

        <!-- Favicon -->
        <link rel="icon" href="/favicon.ico" type="image/x-icon">
        <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

        <!-- Styles -->
        <link rel="stylesheet" href="/styles.min.{{cacheHash}}.css">

        <title>{{#if isHome}}FitGlue – Watch Your Workout Become Extraordinary{{else}}{{pageTitle}} | FitGlue{{/if}}
        </title>

        <!-- Schema.org -->
        <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "FitGlue",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "url": "{{siteUrl}}",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "GBP"
        },
        "description": "{{description}}",
        "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "5",
            "ratingCount": "1"
        }
    }
    </script>
    </head>

    <body>
<header class="mh">
  <a href="/" class="mh__brand">
    <span class="mh__brand-mk">FG</span>
    <span>FITGLUE</span>
  </a>
  <nav class="mh__nav">
    <a href="/features" {{#if isFeatures}}class="on"{{/if}}>FEATURES</a>
    <a href="/how-it-works" {{#if isHowItWorks}}class="on"{{/if}}>HOW IT WORKS</a>
    <a href="/pricing" {{#if isPricing}}class="on"{{/if}}>PRICING</a>
    <a href="/guides">GUIDES</a>
    <a href="/help">HELP</a>
  </nav>
  <div class="mh__cta">
    <span id="nav-auth-login"><a href="/auth/login" class="btn--ghost">LOG IN</a></span>
    <span id="nav-auth-cta"><a href="/auth/register" class="btn--aurora">START FREE →</a></span>
  </div>
  <button class="mh__ham" id="nav-toggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
</header>
<script>
  (function () {
    if (localStorage.getItem('fitglue_auth_state') === 'logged_in') {
      var loginItem = document.getElementById('nav-auth-login');
      var ctaItem = document.getElementById('nav-auth-cta');
      if (loginItem) loginItem.style.display = 'none';
      if (ctaItem) {
        var ctaLink = ctaItem.querySelector('a');
        if (ctaLink) { ctaLink.href = '/app'; ctaLink.textContent = 'GO TO DASHBOARD →'; }
      }
    }
    var toggle = document.getElementById('nav-toggle');
    if (toggle) {
      toggle.addEventListener('click', function () {
        document.querySelector('.mh__nav').classList.toggle('open');
      });
    }
  })();
</script>
